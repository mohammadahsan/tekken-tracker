<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brackets — EVO Japan 2026 Tekken 8</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Config bar ─────────────────────────────────────────────── */
    .config-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .config-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      white-space: nowrap;
    }
    .config-input {
      flex: 1;
      max-width: 540px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 4px 10px;
      font-size: 0.78rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .config-input:focus { border-color: var(--accent); }
    .config-input::placeholder { color: var(--muted); }

    /* ── Bracket wrap ───────────────────────────────────────────── */
    .bracket-hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .bracket-wrap {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      height: 62vh;
      min-height: 420px;
      position: relative;
    }
    .bracket-svg { display: block; cursor: grab; }
    .bracket-svg:active { cursor: grabbing; }

    /* ── Zoom controls ──────────────────────────────────────────── */
    .bracket-zoom-controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      gap: 4px;
      z-index: 2;
    }
    .bracket-zoom-controls button {
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 1rem;
      line-height: 1;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0;
    }
    .bracket-zoom-controls button:hover { background: var(--border); opacity: 1; }

    .bracket-section + .bracket-section { margin-top: 36px; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>EVO Japan 2026 <span class="dim">/ Tekken 8</span></h1>
      <span id="event-meta"></span>
    </div>
    <div class="header-right">
      <span id="last-updated" class="muted"></span>
      <nav class="page-tabs">
        <a href="index.html" class="page-tab">Dashboard</a>
        <a href="brackets.html" class="page-tab active">Brackets</a>
      </nav>
      <button id="btn-refresh">Refresh</button>
    </div>
  </header>

  <!-- Event slug switcher -->
  <div class="config-bar">
    <span class="config-label">Event</span>
    <input
      type="text"
      id="slug-input"
      class="config-input"
      placeholder="tournament/slug/event/event-name"
      spellcheck="false"
      autocomplete="off"
    >
    <button id="btn-apply-slug" class="btn-ghost" style="white-space:nowrap">Apply →</button>
  </div>

  <div id="error-banner" class="error-banner hidden"></div>

  <main>
    <section>
      <h2 class="section-label">
        Tournament Brackets
        <span class="hint">
          <label class="toggle-wrap" style="margin-left:4px">
            <input type="checkbox" id="show-projected" checked>
            <span>Show projected</span>
          </label>
        </span>
        <button id="btn-reset-overrides" class="btn-ghost hidden" style="margin-left:auto">
          Reset Overrides
        </button>
      </h2>
      <p id="bracket-status" class="muted">Loading…</p>
      <div id="brackets-container"></div>
    </section>
  </main>

  <!-- Override picker modal (shared with the bracket page) -->
  <div id="match-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box">
      <p class="modal-label">Override: who wins?</p>
      <div id="match-modal-btns" class="modal-buttons"></div>
      <button class="btn-ghost modal-clear" id="match-modal-clear">Clear override</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="brackets.js"></script>
</body>
</html>
