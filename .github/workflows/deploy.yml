name: Deploy Tekken Tracker to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Set Up SSH Key
      run: |
        echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > private_key.pem
        chmod 400 private_key.pem

    - name: Debug SSH Connection
      run: |
        ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "echo SSH connection successful"

    - name: Deploy to EC2 via SSH
      run: |
        ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
        set -e
        echo "🚀 Starting Deployment"

        cd /home/ubuntu/tekken-tracker

        echo "🔄 Pulling latest changes..."
        git reset --hard
        git pull origin main || { echo "❌ Git Pull Failed!" >&2; exit 1; }

        echo "📦 Installing dependencies..."
        npm ci --omit=dev || { echo "❌ npm install Failed!" >&2; exit 1; }

        echo "🔄 Restarting app..."
        pm2 restart tekken-tracker || pm2 start server.js --name tekken-tracker || { echo "❌ Failed to start app!" >&2; exit 1; }
        pm2 save

        echo "✅ Deployment Completed Successfully!"
        EOF
